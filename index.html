<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Open External</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>

    <h1>ทดสอบเปิดลิงก์นอก LINE</h1>

    <button onclick="openGoogle()">เปิด Google</button>
    <br><br>

    <button onclick="openMap()">เปิด Google Maps</button>
    <br><br>

    <button onclick="openWebsite()">เปิดเว็บไซต์ของฉัน</button>

    <script>
        async function initLIFF() {
            await liff.init({ liffId: "YOUR_LIFF_ID" });
        }

        initLIFF();

        function openGoogle() {
            liff.openWindow({
                url: "https://www.google.com",
                external: true
            });
        }

        function openMap() {
            liff.openWindow({
                url: "https://maps.google.com",
                external: true
            });
        }

        function openWebsite() {
            liff.openWindow({
                url: "https://yourwebsite.com",
                external: true
            });
        }
    </script>

</body>
</html>
